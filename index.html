<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هدية لحبوبتي ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#000,#220022);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:#fff;
}

.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 0 30px rgba(255,0,90,.3);
}

h1{
font-size:32px;
margin-bottom:15px;
color:#ff4d88;
}

p{
font-size:18px;
line-height:1.8;
margin-bottom:25px;
color:#eee;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:20px;
text-align:center;
outline:none;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#ff2d55;
color:white;
font-size:20px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

#msg{
margin-top:15px;
font-size:18px;
color:#ffd700;
}

.heart{
position:absolute;
color:#ff4d88;
font-size:22px;
animation:up 7s linear infinite;
}

@keyframes up{
0%{transform:translateY(100vh);opacity:0;}
100%{transform:translateY(-100vh);opacity:1;}
}
</style>
</head>

<body>

<div class="card">
<h1>💖 اكتبي كلمة السر يا حبوبتي</h1>

<p>
قبل ما تشوفي المفاجأة...
<br><br>
في كلمة سر محدش يعرفها غيرنا،
اليوم اللي بدأت فيه أجمل قصة حب بينا. ❤️
</p>

<input id="pass" placeholder="اكتبي كلمة السر">

<button onclick="check()">دخول 💌</button>

<div id="msg"></div>

</div>

<script>
for(let i=0;i<40;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(h);
}

function check(){
let p=document.getElementById("pass").value;

if(p=="31/3"){
window.location.href="birthday.html";
}else{
document.getElementById("msg").innerHTML=
"🤍 لا يا حبوبتي... فكري في اليوم اللي بدأت فيه أجمل قصة حب بينا ❤️";
}
}
</script>

</body>
</html>
